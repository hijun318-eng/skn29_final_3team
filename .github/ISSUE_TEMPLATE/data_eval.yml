name: 데이터·평가 작업
description: synthetic data, schema, test set, metric, baseline 변경을 정의합니다.
title: "[Data/Eval] "
body:
  - type: dropdown
    id: work_type
    attributes:
      label: 작업 유형
      options:
        - synthetic data
        - schema/preprocessing
        - test set
        - metric/threshold
        - baseline/report
    validations:
      required: true
  - type: textarea
    id: objective
    attributes:
      label: 목적
    validations:
      required: true
  - type: textarea
    id: versions
    attributes:
      label: Version 정보
      description: data, schema, test set, prompt/model version 중 해당 항목을 작성합니다.
    validations:
      required: true
  - type: textarea
    id: provenance
    attributes:
      label: 출처와 생성 기준
      description: synthetic/public/internal 구분, 생성 기준, seed, license 또는 접근 제한을 작성합니다.
    validations:
      required: true
  - type: textarea
    id: quality
    attributes:
      label: 품질 기준
      description: metric, threshold, validation rule, human review 기준을 작성합니다.
    validations:
      required: true
  - type: textarea
    id: comparison
    attributes:
      label: 비교 계획
      description: 기존 baseline과 동일 조건으로 비교하는 방법을 작성합니다.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: 확인
      options:
        - label: 실제 개인정보나 고객 원문을 commit하지 않습니다.
          required: true
        - label: synthetic 결과를 실제 호텔 사실로 표현하지 않습니다.
          required: true
