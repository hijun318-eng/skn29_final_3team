name: 기능 작업
description: 새 기능 또는 사용자 가치 변경을 정의합니다.
title: "[Feature] "
body:
  - type: markdown
    attributes:
      value: |
        하나의 Issue에는 하나의 검증 가능한 결과만 작성합니다.
  - type: input
    id: objective
    attributes:
      label: 목표
      description: 사용자가 얻게 될 결과를 한 문장으로 작성합니다.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: 배경과 근거
      description: 현재 문제, 관련 문서, 확인한 사실을 작성합니다.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: In scope
      description: 수정하거나 만들 수 있는 범위를 작성합니다.
    validations:
      required: true
  - type: textarea
    id: out_scope
    attributes:
      label: Out of scope
      description: 이번 작업에서 하지 않을 일을 작성합니다.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 완료 조건
      description: 사람이 확인하거나 test로 검증할 수 있는 기준을 작성합니다.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: 검증 계획
      description: test, eval, 수동 확인, 실패 시 중단 조건을 작성합니다.
    validations:
      required: true
